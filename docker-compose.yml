version: "3.9"

services:
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    ports:
      - "80:80"
    restart: unless-stopped
    depends_on:
      - signaling

  signaling:
    build:
      context: .
      dockerfile: Dockerfile.1
    expose:
      - "3001"
    restart: unless-stopped
