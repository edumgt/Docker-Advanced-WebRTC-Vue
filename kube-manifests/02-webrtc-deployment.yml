apiVersion: apps/v1
kind: Deployment
metadata:
  name: webrtc-signaling
  namespace: webrtc
  labels:
    app: webrtc-signaling
    app.kubernetes.io/name: webrtc-signaling
    app.kubernetes.io/part-of: docker-advanced-webrtc-vue
spec:
  replicas: 1
  selector:
    matchLabels:
      app: webrtc-signaling
  template:
    metadata:
      labels:
        app: webrtc-signaling
        app.kubernetes.io/name: webrtc-signaling
        app.kubernetes.io/part-of: docker-advanced-webrtc-vue
    spec:
      containers:
        - name: signaling
          image: edumgt/webrtc-signaling:latest
          imagePullPolicy: Always
          ports:
            - name: signaling
              containerPort: 3001
          readinessProbe:
            httpGet:
              path: /health
              port: 3001
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 3001
            initialDelaySeconds: 15
            periodSeconds: 20
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
